<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <title>To-Do List</title>
    <style>
      /* General */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(to right, #310d67, #82288d);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background-color: #1c1f26;
        padding: 2rem;
        width: 400px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.4);
      }

      h1 {
        text-align: center;
        margin-bottom: 1rem;
        font-size: 2rem;
      }

      /* Input Section */
      .input-section {
        display: flex;
        margin-bottom: 1rem;
      }

      #todo-input {
        flex: 1;
        padding: 0.8rem;
        border: none;
        outline: none;
        border-radius: 5px;
      }

      #add-btn {
        background-color: #6b3faf;
        color: #fff;
        border: none;
        padding: 0.8rem 1rem;
        border-radius: 5px;
        cursor: pointer;
        margin-left: 0.5rem;
        font-weight: bold;
      }

      #add-btn:hover {
        background-color: #8b4dc4;
      }

      /* To-Do List */
      #todo-list {
        list-style: none;
      }

      #todo-list li {
        background-color: #2c2f36;
        padding: 0.8rem;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-radius: 5px;
      }

      .todo-item {
        display: flex;
        align-items: center;
      }

      .todo-item input {
        margin-right: 0.5rem;
      }

      .todo-item.completed span {
        text-decoration: line-through;
        color: #888;
      }

      /* Footer */
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 1rem;
      }

      .footer button {
        background: none;
        border: none;
        color: #bbb;
        cursor: pointer;
      }

      .footer button.active,
      .footer button:hover {
        color: #fff;
      }

      #clear-completed {
        color: #d9534f;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>TODO</h1>
      <div class="input-section">
        <input
          type="text"
          value=""
          id="todo-input"
          placeholder="Create a new todo..."
        />
        <button id="add-btn">+</button>
      </div>
      <ul id="todo-list"></ul>
      <div class="footer">
        <span id="items-left">0 items left</span>
        <div class="filters">
          <button id="filter-all" class="filter-btn active">All</button>
          <button id="filter-active" class="filter-btn">Active</button>
          <button id="filter-completed" class="filter-btn">Completed</button>
        </div>
        <button id="clear-completed">Clear Completed</button>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
